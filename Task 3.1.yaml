openapi: 3.0.4
info:
  title: User Registration API
  version: 1.0.0

paths:
  /api/v1/users:
    post:
      summary: Create new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstName
                - lastName
                - email
                - password
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        '201':
          description: User successfully created
        '400':
          description: Validation error
        '409':
          description: Email already exists
        '500':
          description: Internal server error
